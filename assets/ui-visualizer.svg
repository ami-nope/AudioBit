<svg width="520" height="120" viewBox="0 0 520 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AudioBit live EQ and volume">
  <defs>
    <linearGradient id="vol-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1db954" />
      <stop offset="100%" stop-color="#1db954" />
    </linearGradient>
    <filter id="eq-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="520" height="120" rx="16" fill="#0f172a" />

  <!-- EQ bars -->
  <g transform="translate(24 18)" filter="url(#eq-glow)">
    <rect x="0" y="72" width="12" height="7" rx="6" fill="#8b5cf6">
      <animate attributeName="height" values="7;18;10;22;7" dur="1.9s" repeatCount="indefinite" />
      <animate attributeName="y" values="72;61;69;57;72" dur="1.9s" repeatCount="indefinite" />
    </rect>
    <rect x="18" y="70" width="12" height="9" rx="6" fill="#9333ea">
      <animate attributeName="height" values="9;22;12;28;9" dur="2.2s" repeatCount="indefinite" begin="-0.3s" />
      <animate attributeName="y" values="70;57;67;51;70" dur="2.2s" repeatCount="indefinite" begin="-0.3s" />
    </rect>
    <rect x="36" y="67" width="12" height="12" rx="6" fill="#a855f7">
      <animate attributeName="height" values="12;26;16;30;12" dur="2.0s" repeatCount="indefinite" begin="-0.6s" />
      <animate attributeName="y" values="67;53;63;49;67" dur="2.0s" repeatCount="indefinite" begin="-0.6s" />
    </rect>
    <rect x="54" y="64" width="12" height="15" rx="6" fill="#c026d3">
      <animate attributeName="height" values="15;30;18;34;15" dur="2.4s" repeatCount="indefinite" begin="-0.8s" />
      <animate attributeName="y" values="64;49;61;45;64" dur="2.4s" repeatCount="indefinite" begin="-0.8s" />
    </rect>
    <rect x="72" y="55" width="12" height="24" rx="6" fill="#d946ef">
      <animate attributeName="height" values="24;38;20;44;24" dur="2.1s" repeatCount="indefinite" begin="-0.2s" />
      <animate attributeName="y" values="55;41;59;35;55" dur="2.1s" repeatCount="indefinite" begin="-0.2s" />
    </rect>
    <rect x="90" y="59" width="12" height="20" rx="6" fill="#e879f9">
      <animate attributeName="height" values="20;34;18;40;20" dur="2.3s" repeatCount="indefinite" begin="-1.1s" />
      <animate attributeName="y" values="59;45;61;39;59" dur="2.3s" repeatCount="indefinite" begin="-1.1s" />
    </rect>
    <rect x="108" y="63" width="12" height="16" rx="6" fill="#f472b6">
      <animate attributeName="height" values="16;30;14;34;16" dur="2.0s" repeatCount="indefinite" begin="-0.4s" />
      <animate attributeName="y" values="63;49;65;45;63" dur="2.0s" repeatCount="indefinite" begin="-0.4s" />
    </rect>
    <rect x="126" y="61" width="12" height="18" rx="6" fill="#f43f5e">
      <animate attributeName="height" values="18;36;16;38;18" dur="2.5s" repeatCount="indefinite" begin="-0.9s" />
      <animate attributeName="y" values="61;43;63;41;61" dur="2.5s" repeatCount="indefinite" begin="-0.9s" />
    </rect>
    <rect x="144" y="65" width="12" height="14" rx="6" fill="#fb7185">
      <animate attributeName="height" values="14;28;12;32;14" dur="2.2s" repeatCount="indefinite" begin="-0.1s" />
      <animate attributeName="y" values="65;51;67;47;65" dur="2.2s" repeatCount="indefinite" begin="-0.1s" />
    </rect>
    <rect x="162" y="67" width="12" height="12" rx="6" fill="#fb923c">
      <animate attributeName="height" values="12;26;10;30;12" dur="2.1s" repeatCount="indefinite" begin="-0.7s" />
      <animate attributeName="y" values="67;53;69;49;67" dur="2.1s" repeatCount="indefinite" begin="-0.7s" />
    </rect>
    <rect x="180" y="69" width="12" height="10" rx="6" fill="#f97316">
      <animate attributeName="height" values="10;24;8;28;10" dur="2.4s" repeatCount="indefinite" begin="-1.3s" />
      <animate attributeName="y" values="69;55;71;51;69" dur="2.4s" repeatCount="indefinite" begin="-1.3s" />
    </rect>
    <rect x="198" y="71" width="12" height="8" rx="6" fill="#ea580c">
      <animate attributeName="height" values="8;22;6;26;8" dur="2.2s" repeatCount="indefinite" begin="-0.5s" />
      <animate attributeName="y" values="71;57;73;53;71" dur="2.2s" repeatCount="indefinite" begin="-0.5s" />
    </rect>
    <rect x="216" y="71" width="12" height="8" rx="6" fill="#fb923c">
      <animate attributeName="height" values="8;20;6;24;8" dur="2.0s" repeatCount="indefinite" begin="-1.0s" />
      <animate attributeName="y" values="71;59;73;55;71" dur="2.0s" repeatCount="indefinite" begin="-1.0s" />
    </rect>
    <rect x="234" y="73" width="12" height="6" rx="6" fill="#f97316">
      <animate attributeName="height" values="6;18;5;20;6" dur="2.3s" repeatCount="indefinite" begin="-0.2s" />
      <animate attributeName="y" values="73;61;74;59;73" dur="2.3s" repeatCount="indefinite" begin="-0.2s" />
    </rect>
  </g>

  <!-- Volume row -->
  <g transform="translate(24 78)">
    <rect x="0" y="10" width="360" height="8" rx="4" fill="#1f2937" />
    <rect x="0" y="10" width="360" height="8" rx="4" fill="url(#vol-grad)">
      <animate attributeName="width" values="340;360;330;360;345" dur="2.6s" repeatCount="indefinite" />
    </rect>
    <circle cx="360" cy="14" r="9" fill="#e5e7eb">
      <animate attributeName="cx" values="340;360;330;360;345" dur="2.6s" repeatCount="indefinite" />
    </circle>
    <text x="382" y="18" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#f8fafc">100%</text>
  </g>
</svg>
