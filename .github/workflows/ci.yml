name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore solution
        run: dotnet restore AudioBit.sln

      - name: Build solution
        run: dotnet build AudioBit.sln -c Debug --no-restore

      - name: Run installer tests
        run: dotnet test AudioBit.Installer.Tests\AudioBit.Installer.Tests.csproj -c Debug
